<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>フォトギャラリー｜BOSCO NEXT</title>
<meta name="description" content="BOSCO NEXT（ボスコ ネクスト）の試合・練習・合宿の写真ギャラリー。">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Dela+Gothic+One&family=Zen+Kaku+Gothic+New:wght@400;500;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<header id="site-header"></header>
<nav class="mobile-menu" id="mobileMenu"></nav>

<section class="subhero">
  <div class="wrap subhero-inner">
    <div class="breadcrumb"><a href="index.html">ホーム</a> ／ フォトギャラリー</div>
    <span class="kicker">Gallery</span>
    <h1>フォトギャラリー</h1>
    <p>試合・練習・合宿の風景をお届けします。</p>
  </div>
</section>

<section class="block">
  <div class="wrap">
    <div class="gallery-grid reveal" id="gallery"></div>
    <p class="cnote reveal" style="margin-top:20px">※ 写真を追加するには、下の photos に画像URLを足してください（SNSの画像URLや、画像をネット上に置いたURLが使えます）。空欄のマスは追加用の見本です。</p>
  </div>
</section>

<section class="cta-band">
  <div class="wrap">
    <h2>もっと見る</h2>
    <p>最新の写真はSNSでも随時更新しています。</p>
    <div class="hero-cta">
      <a class="btn btn-primary" href="links.html">SNS・リンク集へ</a>
      <a class="btn btn-ghost" data-link="contact">お問い合わせ</a>
    </div>
  </div>
</section>

<footer id="site-footer"></footer>
<button class="to-top" id="toTop" aria-label="上に戻る">↑</button>

<!-- チーム写真を1枚目に使うため読み込み -->
<script src="team-photo.js"></script>
<script src="site.js"></script>
<script>
/* =====================================================================
   ★★★ このページの内容はここを編集します ★★★
   ・写真を追加 → photos に { src:"画像のURL", cap:"説明" } を足す
   ・src を "" にすると「追加用の見本マス」になります
   ===================================================================== */
const PAGE = {
  photos: [
    {src: HERO_IMG, cap:"2026 ソーシャルフットボール東京都大会"},
    {src:"", cap:"写真の説明"},
    {src:"", cap:"写真の説明"},
    {src:"", cap:"写真の説明"},
    {src:"", cap:"写真の説明"},
    {src:"", cap:"写真の説明"}
  ]
};

/* ===== 表示の仕組み ===== */
document.getElementById("gallery").innerHTML = PAGE.photos.map(function(p){
  var inner = p.src
    ? '<img src="'+esc(p.src)+'" alt="'+esc(p.cap||"")+'"><span class="cap">'+esc(p.cap||"")+'</span>'
    : '<span class="gallery-empty">＋ 画像URLを追加</span>';
  return '<div class="gallery-item">'+inner+'</div>';
}).join("");

observeReveals();
</script>
</body>
</html>
